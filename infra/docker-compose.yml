# 운영 단일 노드: app(Next.js) + db(PostgreSQL) + nginx(리버스 프록시/SSL)
# 사용:  docker compose -f infra/docker-compose.yml --env-file infra/.env up -d --build
services:
  db:
    image: postgres:16-alpine
    container_name: signalsmm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - signalsmm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: signalsmm-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
    # 배포 시 마이그레이션을 적용한 뒤 서버 기동
    command: sh -c "npx prisma migrate deploy && node server.js"
    expose:
      - "3050"
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: signalsmm-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
    networks:
      - internal

volumes:
  signalsmm_pgdata:

networks:
  internal:
    driver: bridge
